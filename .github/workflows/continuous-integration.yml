name: Continuous Integration
on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
env:
  NODE_OPTIONS: "--max-old-space-size=4096"
jobs:
  build-test:
    env:
      DO_NOT_TRACK: 1
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Biome check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Generate documentation (but don't commit it)
        run: |
          apps/cli/dist/cli.js generate json-schemas -o docs/model/schema.json
          apps/cli/dist/cli.js generate schema-markdown >docs/model/schemas.md

name: Continuous Deployment
on:
  push:
    branches:
      - "main"
  workflow_dispatch:
permissions:
  id-token: write
  contents: write
jobs:
  build-test:
    env:
      DO_NOT_TRACK: 1
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: "npm"
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Biome check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Generate documentation
        run: |
          apps/cli/dist/cli.js model json-schemas -o docs/model/json-schemas
          apps/cli/dist/cli.js model markdown >docs/model/schemas.md
      - uses: stefanzweifel/git-auto-commit-action@v7
        name: "Commit generated documentation"
        with:
          commit_message: "generated docs"
          file_pattern: "docs/model/**"
